syntax = "proto3";

package xgc.mavlink.v1;

option go_package = "xgc2/protocols/xgc/mavlink/v1;mavlinkv1";

// CommandLongRequest carries the command-level contents of MAVLink
// COMMAND_LONG. xgc.v1.Message.robot_id selects the adapter-bound MAVLink
// system; MAVLink framing, sequence numbers, checksums, and signing remain the
// responsibility of MAVROS or another native adapter.
//
// command is a numeric MAV_CMD value. Keeping it numeric allows commands from
// new MAVLink dialects to pass through without changing this protobuf. The
// adapter profile must still authorize each command before forwarding it.
message CommandLongRequest {
  bool broadcast = 1;
  uint32 command = 2;
  uint32 confirmation = 3;
  float param1 = 4;
  float param2 = 5;
  float param3 = 6;
  float param4 = 7;
  float param5 = 8;
  float param6 = 9;
  float param7 = 10;
}

// CommandAck carries the native fields of MAVLink COMMAND_ACK.
//
// result is a numeric MAV_RESULT value. progress is in [0, 100], or 255 when
// progress is unavailable. MAVROS CommandLong only exposes command result, so
// its adapter sets progress to 255 and leaves unavailable extension fields at
// zero. Transport failures are reported by xgc.adapter.v1.OperationEvent and
// do not fabricate a CommandAck.
message CommandAck {
  uint32 command = 1;
  uint32 result = 2;
  uint32 progress = 3;
  int32 result_param2 = 4;
  uint32 target_system = 5;
  uint32 target_component = 6;
}
