syntax = "proto3";

package xgc.semantic.aerial.v1;

option go_package = "xgc2/protocols/xgc/semantic/aerial/v1;aerialv1";

import "xgc/semantic/common/v1/types.proto";

enum LocalCoordinateFrame {
  LOCAL_COORDINATE_FRAME_UNSPECIFIED = 0;
  LOCAL_COORDINATE_FRAME_NED = 1;
  LOCAL_COORDINATE_FRAME_OFFSET_NED = 2;
  LOCAL_COORDINATE_FRAME_BODY_NED = 3;
  LOCAL_COORDINATE_FRAME_BODY_OFFSET_NED = 4;
}

// valid_fields uses bits 0..2 for position XYZ, 3..5 for velocity XYZ,
// 6..8 for acceleration/force XYZ, bit 9 for yaw, and bit 10 for yaw rate.
message LocalTrajectorySetpoint {
  string frame_id = 1;
  LocalCoordinateFrame coordinate_frame = 2;
  uint32 valid_fields = 3;
  xgc.semantic.common.v1.Vector3 position = 4;
  xgc.semantic.common.v1.Vector3 velocity = 5;
  xgc.semantic.common.v1.Vector3 acceleration_or_force = 6;
  double yaw_rad = 7;
  double yaw_rate_rad_s = 8;
  bool acceleration_is_force = 9;
}

// valid_fields uses bit 0 for orientation, bits 1..3 for body rate XYZ, and
// bit 4 for normalized thrust.
message AttitudeSetpoint {
  string frame_id = 1;
  uint32 valid_fields = 2;
  xgc.semantic.common.v1.Quaternion orientation = 3;
  xgc.semantic.common.v1.Vector3 body_rate_rad_s = 4;
  double thrust = 5;
}
