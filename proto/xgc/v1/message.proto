syntax = "proto3";

package xgc.v1;

option go_package = "xgc2/protocols/xgc/v1;xgcv1";

enum ClockDomain {
  CLOCK_DOMAIN_UNSPECIFIED = 0;
  CLOCK_DOMAIN_UNIX = 1;
  CLOCK_DOMAIN_NATIVE = 2;
  CLOCK_DOMAIN_SIMULATION = 3;
  CLOCK_DOMAIN_STEADY = 4;
}

enum PayloadEncoding {
  PAYLOAD_ENCODING_UNSPECIFIED = 0;
  PAYLOAD_ENCODING_PROTOBUF = 1;
  PAYLOAD_ENCODING_JSON = 2;
  PAYLOAD_ENCODING_BYTES = 3;
}

// Empty is the registry-owned no-content schema used when an endpoint's
// request or response carries no domain data. Unlike an external protobuf
// Empty type, it has an XGC message ID and immutable schema fingerprint.
message Empty {}

message TimePoint {
  sfixed64 nanoseconds = 1;
  ClockDomain clock_domain = 2;
}

message SchemaReference {
  uint32 message_id = 1;
  string type_name = 2;
  uint32 schema_version = 3;
  fixed64 schema_fingerprint = 4;
}

message Payload {
  SchemaReference schema = 1;
  PayloadEncoding encoding = 2;
  bytes value = 3;
}

// Message is a domain-neutral, timestamped payload. Domain routing such as a
// robot or channel identity belongs in a domain wrapper rather than this type.
message Message {
  uint64 sequence = 1;
  TimePoint source_time = 2;
  sfixed64 observed_unix_nanos = 3;
  Payload payload = 4;
}
