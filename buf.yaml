version: v2
modules:
  - path: proto
lint:
  use:
    - STANDARD
  except:
    # AdapterLink and its direction-oriented batch/stream envelopes are frozen
    # public names for this protocol epoch.
    - RPC_REQUEST_RESPONSE_UNIQUE
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - SERVICE_SUFFIX
breaking:
  use:
    - FILE
