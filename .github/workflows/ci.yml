name: ci

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.x

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install C++ and protobuf tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libgrpc++-dev \
            libprotobuf-dev \
            libre2-dev \
            pkg-config \
            protobuf-compiler \
            protobuf-compiler-grpc \
            python3-venv

      - name: Install pinned generators
        run: |
          set -euo pipefail
          python -m pip install -r requirements/generator.txt
          tools/install-go-plugins.sh

      - name: Generate and test C++, Go, and Python
        run: |
          set -euo pipefail
          tools/smoke-test.sh

      - name: Check source cleanliness
        run: |
          set -euo pipefail
          git diff --check HEAD
          test -z "$(git status --short --untracked-files=no)"
