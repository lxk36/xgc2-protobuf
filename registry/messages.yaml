version: 1

# These IDs appeared in an earlier public protocol revision. They stay reserved
# after their payloads are removed so the registry's never-reuse rule remains
# true across releases.
reserved_ids: [3101, 3111, 3121, 3131, 3199, 5001, 5099]

# IDs are global and never reused. Payloads are reusable XGC2 semantics;
# protocol-native dialects and middleware message types never become the
# cross-language contract.
messages:
  - id: 1
    type: xgc.v1.Empty
    version: 1
    roles: [request, response]

