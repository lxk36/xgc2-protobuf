version: 1

# These IDs appeared in the public prototype before their high-level
# arm/mode/takeoff/land messages were replaced or removed. They stay reserved
# so the registry's never-reuse rule remains true even before the first Debian
# release.
reserved_ids: [3101, 3111, 3121, 3131, 3199]

# IDs are global and never reused. Payloads are reusable XGC2 semantics or
# explicitly named protocol-native dialect messages; native ROS message types
# never become the cross-language contract.
messages:
  - id: 1001
    type: xgc.semantic.common.v1.MotionVelocitySetpoint
    version: 1
    roles: [control]

  - id: 2001
    type: xgc.semantic.common.v1.PoseEstimate
    version: 1
    roles: [telemetry]

  - id: 2002
    type: xgc.semantic.common.v1.VelocityEstimate
    version: 1
    roles: [telemetry]

  - id: 2003
    type: xgc.semantic.common.v1.ImuEstimate
    version: 1
    roles: [telemetry]

  - id: 2004
    type: xgc.semantic.common.v1.PowerStatus
    version: 1
    roles: [telemetry]

  - id: 2005
    type: xgc.semantic.common.v1.VehicleHealth
    version: 1
    roles: [telemetry]

  - id: 2010
    type: xgc.semantic.common.v1.ChannelHealth
    version: 1
    roles: [diagnostic]

  - id: 3001
    type: xgc.semantic.aerial.v1.FlightStatus
    version: 1
    roles: [telemetry]

  - id: 5001
    type: xgc.mavlink.v1.CommandLongRequest
    version: 1
    roles: [request]

  - id: 5099
    type: xgc.mavlink.v1.CommandAck
    version: 1
    roles: [response]
