    type: xgc.semantic.common.v1.MotionVelocitySetpoint
    version: 1
    roles: [control]

  - id: 2001
    type: xgc.semantic.common.v1.PoseEstimate
    version: 1
    roles: [telemetry]

  - id: 2002
    type: xgc.semantic.common.v1.VelocityEstimate
    version: 1
    roles: [telemetry]

  - id: 2003
    type: xgc.semantic.common.v1.ImuEstimate
    version: 1
    roles: [telemetry]

  - id: 2004
