schema: xgc2.adapter-profile.v1
profile_id: scout-mini.ros1.v1
profile_version: 1
native_protocol: ros1
robot_kind: scout-mini
description: Scout Mini odometry, chassis status, IMU telemetry, and channel diagnostics.
namespace_parameter: namespace
parameters:
  namespace:
    type: ros_namespace
    required: true
    description: Unique ROS namespace assigned to this robot by the swarm asset.
channels:
  - id: state.pose
    kind: stream_out
    output_message_id: 2001
    processor: scout-mini.pose-estimate
    output_rate_hz: 10
    inputs:
      odometry:
        name: odom
        type: nav_msgs/Odometry

  - id: state.velocity
    kind: stream_out
    output_message_id: 2002
    processor: scout-mini.velocity-estimate
    output_rate_hz: 10
    inputs:
      odometry:
        name: odom
        type: nav_msgs/Odometry

  - id: state.imu
    kind: stream_out
    output_message_id: 2003
    processor: scout-mini.imu-estimate
    output_rate_hz: 10
    inputs:
      imu:
        name: imu/data_raw
        type: sensor_msgs/Imu

  - id: state.power
    kind: stream_out
    output_message_id: 2004
    processor: scout-mini.power-status
    output_rate_hz: 2
    inputs:
      chassis_status:
        name: scout_status
        type: scout_msgs/ScoutStatus

  - id: state.health
    kind: stream_out
    output_message_id: 2005
    processor: scout-mini.vehicle-health
    output_rate_hz: 2
    inputs:
      chassis_status:
        name: scout_status
        type: scout_msgs/ScoutStatus

  - id: diagnostic.channel-health
    kind: stream_out
    output_message_id: 2010
    processor: common.channel-health
    output_rate_hz: 1
    observes:
      - state.pose
      - state.velocity
      - state.imu
      - state.power
      - state.health
